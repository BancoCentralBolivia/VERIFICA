<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Verificador BCB — Billetes Inválidos</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --gold: #C9A840; --gold-l: #E8C96A; --gold-d: #9C7D22;
      --teal: #071E25; --teal-m: #0D3D4A; --teal-b: #0F4A5C;
      --g: #2ECC71; --r: #E74C3C; --y: #F39C12;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(155deg, var(--teal) 0%, var(--teal-m) 45%, var(--teal-b) 75%, var(--teal) 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 20px 15px;
    }

    /* Glows de fondo */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: -1;
      background:
        radial-gradient(ellipse 90% 50% at 15% 5%, rgba(201, 168, 64, .08) 0%, transparent 60%),
        radial-gradient(ellipse 70% 70% at 85% 95%, rgba(46, 143, 163, .12) 0%, transparent 60%);
    }

    main {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* ── ENCABEZADO ORIGINAL ── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 10px;
    }
    .logo {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: 1px solid rgba(201, 168, 64, .5);
      box-shadow: 0 0 15px rgba(201, 168, 64, .2);
    }
    .titles { display: flex; flex-direction: column; }
    .titles h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold-l);
      letter-spacing: 0.05em;
    }
    .titles h2 {
      font-size: 0.75rem;
      font-weight: 400;
      color: rgba(255, 255, 255, .6);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── CARD PRINCIPAL ORIGINAL ── */
    .card {
      background: linear-gradient(145deg, rgba(255, 255, 255, .07), rgba(255, 255, 255, .02));
      border: 1px solid rgba(201, 168, 64, .2);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, .3), inset 0 1px 0 rgba(201, 168, 64, .14);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-bottom: 8px;
    }

    .dgroup { display: flex; gap: 8px; }
    .dbtn {
      flex: 1; padding: 10px 4px;
      border: 1px solid rgba(201, 168, 64, .28);
      border-radius: 10px;
      background: transparent;
      color: rgba(255, 255, 255, .6);
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .dbtn.active {
      border-color: var(--gold);
      background: rgba(201, 168, 64, .15);
      color: var(--gold-l);
      box-shadow: inset 0 0 10px rgba(201, 168, 64, .1);
    }

    .iwrap { position: relative; }
    .sinput {
      width: 100%;
      padding: 14px;
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-align: center;
      background: rgba(0, 0, 0, .3);
      border: 1px solid rgba(201, 168, 64, .25);
      border-radius: 12px;
      color: #fff; outline: none;
      transition: all .3s;
    }
    .sinput::placeholder { color: rgba(255, 255, 255, .15); font-size: 1.1rem; }
    .sinput:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(201, 168, 64, .2); }
    .dcnt {
      position: absolute; right: 12px; bottom: -18px;
      font-size: 0.65rem; color: rgba(255, 255, 255, .4);
    }

    /* Botones Originales */
    .btn-check, .btn-scan {
      width: 100%;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .2s;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
    }
    .btn-check {
      padding: 14px;
      margin-top: 8px;
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, var(--gold-l), var(--gold), var(--gold-d));
      color: var(--teal);
      box-shadow: 0 4px 15px rgba(201, 168, 64, .3);
    }
    .btn-scan {
      padding: 12px;
      background: rgba(201, 168, 64, .08);
      border: 1px solid rgba(201, 168, 64, .3);
      color: var(--gold-l);
      font-size: 0.9rem;
    }
    .btn-check:active, .btn-scan:active { transform: scale(0.97); }
    #cameraInput { display: none; }

    .sstatus {
      text-align: center; font-size: 0.75rem; color: var(--gold-l);
      margin-top: -4px; min-height: 14px; display: none;
    }
    .sstatus.show { display: block; }

    /* ── RESULTADOS COMPACTADOS ── */
    .rbox {
      width: 100%; border-radius: 12px;
      max-height: 0; overflow: hidden; opacity: 0;
      transition: all .3s ease;
    }
    /* Compactamos el padding del contenedor de resultados */
    .rbox.visible { max-height: 400px; padding: 12px; opacity: 1; }
    .rbox.valid { background: rgba(39, 174, 96, .1); border: 1px solid rgba(39, 174, 96, .3); }
    .rbox.invalid { background: rgba(192, 57, 43, .1); border: 1px solid rgba(192, 57, 43, .3); }
    .rbox.warn { background: rgba(243, 156, 18, .1); border: 1px solid rgba(243, 156, 18, .3); }

    .rsub {
      text-align: center; font-size: 0.75rem; color: rgba(255, 255, 255, .8);
      display: block; margin-bottom: 8px; font-weight: 600;
    }

    /* Reducimos el espacio entre las filas de resultados */
    .rdetail { display: none; flex-direction: column; gap: 4px; }
    .rdetail.show { display: flex; }

    /* Filas compactas */
    .drow {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255, 255, 255, .05); border-radius: 8px;
      padding: 6px 12px; border: 1px solid rgba(255, 255, 255, .08);
    }
    .drname { font-family: 'Cinzel', serif; font-size: 0.9rem; font-weight: 700; color: var(--gold-l); }
    .dbadge {
      padding: 3px 8px; border-radius: 99px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
    }
    .dbadge.ok { background: rgba(39, 174, 96, .2); color: var(--g); border: 1px solid var(--g); }
    .dbadge.bad { background: rgba(192, 57, 43, .2); color: var(--r); border: 1px solid var(--r); }
    .dbadge.warn { background: rgba(243, 156, 18, .2); color: var(--y); border: 1px solid var(--y); }

    /* ── INFO Y FOOTER ── */
    .istrip {
      padding: 10px; text-align: center;
      font-size: 0.75rem; color: rgba(255, 255, 255, .6);
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 5px;
    }
    footer {
      margin-top: auto;
      padding-top: 20px;
      text-align: center; display: flex; flex-direction: column; gap: 4px;
    }
    .fbrand {
      font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 700; color: var(--gold);
      text-decoration: none;
    }
    .ftext { font-size: 0.6rem; color: rgba(255, 255, 255, .3); }
  </style>
</head>

<body>
  <header>
    <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/Banco_Central_de_Bolivia.svg/200px-Banco_Central_de_Bolivia.svg.png" alt="BCB Logo" onerror="this.style.display='none'">
    <div class="titles">
      <h1>Verificador BCB</h1>
      <h2>Billetes Serie B (CP9/2026)</h2>
    </div>
  </header>

  <main>
    <div class="card">
      <div>
        <span class="label">Denominación</span>
        <div class="dgroup" role="group">
          <button class="dbtn" id="btn-bs10" onclick="selectDenom('Bs10')">Bs 10</button>
          <button class="dbtn" id="btn-bs20" onclick="selectDenom('Bs20')">Bs 20</button>
          <button class="dbtn" id="btn-bs50" onclick="selectDenom('Bs50')">Bs 50</button>
          <button class="dbtn active" id="btn-todos" onclick="selectDenom('TODOS')">Todas ★</button>
        </div>
      </div>

      <div>
        <span class="label">Número de Serie</span>
        <div class="iwrap">
          <input type="text" id="serialInput" class="sinput" placeholder="Ej: 077100001" maxlength="9" inputmode="numeric" autocomplete="off" oninput="updateCounter()" onkeydown="if(event.key==='Enter') comprobar()" />
          <span class="dcnt" id="digitCount">0 / 9</span>
        </div>
      </div>

      <button class="btn-check" onclick="comprobar()">✦ COMPROBAR ✦</button>
      
      <div>
        <button class="btn-scan" onclick="triggerCamera()" title="Escanear billete">📷 Escanear con cámara</button>
        <div class="sstatus" id="scanStatus"></div>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleCameraImage(event)" />
      </div>
    </div>

    <!-- Resultados Compactados -->
    <div class="rbox" id="resultBox">
      <span class="rsub" id="resultSub"></span>
      <div class="rdetail" id="resultDetail"></div>
    </div>
    
    <div class="istrip">Billetes <strong>Serie B</strong> sin valor legal.</div>
  </main>

  <footer>
    <a class="fbrand" href="https://wa.me/59165620007" target="_blank">By MKS</a>
    <span class="ftext">Verificador Oficial — Bolivia 2026</span>
  </footer>

  <script>
    // API Key insertada según solicitud
    const apiKey = "AIzaSyA_2zocK4uK2BqTy7JGvUDRolfbEiGNhwE"; 

    const MAX_PRINTED_SERIALS = { Bs10: 109850000, Bs20: 120950000, Bs50: 92250000 };
    const INVALID_RANGES = {
      Bs50: [[67250001, 67700000], [69050001, 69500000], [69500001, 69950000], [69950001, 70400000], [70400001, 70850000], [70850001, 71300000], [76310012, 85139995], [86400001, 86850000], [90900001, 91350000], [91800001, 92250000]],
      Bs20: [[87280145, 91646549], [96650001, 97100000], [99800001, 100250000], [100250001, 100700000], [109250001, 109700000], [110600001, 111050000], [111050001, 111500000], [111950001, 112400000], [112400001, 112850000], [112850001, 113300000], [114200001, 114650000], [114650001, 115100000], [115100001, 115550000], [118700001, 119150000], [119150001, 119600000], [120500001, 120950000]],
      Bs10: [[77100001, 77550000], [78000001, 78450000], [78900001, 96350000], [96350001, 96800000], [96800001, 97250000], [98150001, 98600000], [104900001, 105350000], [105350001, 105800000], [106700001, 107150000], [107600001, 108050000], [108050001, 108500000], [109400001, 109850000]],
    };

    let selectedDenom = 'TODOS';

    function selectDenom(d) {
      selectedDenom = d;
      document.querySelectorAll('.dbtn').forEach(b => b.classList.remove('active'));
      document.getElementById({ Bs10: 'btn-bs10', Bs20: 'btn-bs20', Bs50: 'btn-bs50', TODOS: 'btn-todos' }[d]).classList.add('active');
      document.getElementById('resultBox').classList.remove('visible', 'valid', 'invalid', 'warn');
    }

    function updateCounter() {
      const v = document.getElementById('serialInput').value.replace(/\D/g, '');
      document.getElementById('serialInput').value = v;
      document.getElementById('digitCount').textContent = v.length + ' / 9';
    }

    function normalizeSerial(r) { return r.length === 8 ? '0' + r : r }

    function checkStatus(s9, denom) {
      const n = parseInt(s9, 10);
      if (n > MAX_PRINTED_SERIALS[denom]) return 'NOT_EXIST';
      const ranges = INVALID_RANGES[denom] || [];
      return ranges.some(([f, t]) => n >= f && n <= t) ? 'INVALID' : 'VALID';
    }

    function comprobar() {
      const raw = document.getElementById('serialInput').value.trim();
      const box = document.getElementById('resultBox');
      const sub = document.getElementById('resultSub');
      const detail = document.getElementById('resultDetail');

      if (!raw || !/^\d{8,9}$/.test(raw)) {
        box.className = 'rbox visible invalid';
        sub.textContent = '⚠️ Ingresa 8 ó 9 números.';
        detail.classList.remove('show'); detail.innerHTML = '';
        return;
      }

      const s9 = normalizeSerial(raw);
      box.className = 'rbox'; void box.offsetWidth;

      let denoms = selectedDenom === 'TODOS' 
        ? [{ k: 'Bs10', l: 'Bs 10' }, { k: 'Bs20', l: 'Bs 20' }, { k: 'Bs50', l: 'Bs 50' }]
        : [{ k: selectedDenom, l: selectedDenom.replace('Bs', 'Bs ') }];

      let status = 'valid';
      if (denoms.some(d => checkStatus(s9, d.k) === 'INVALID')) status = 'invalid';
      else if (denoms.some(d => checkStatus(s9, d.k) === 'NOT_EXIST')) status = 'warn'; 

      box.classList.add('visible', status);
      sub.textContent = `Serie ${s9}`;

      detail.innerHTML = denoms.map(d => {
        const st = checkStatus(s9, d.k);
        const [cls, txt] = st === 'NOT_EXIST' ? ['warn','❓ NO EXISTE'] : (st === 'INVALID' ? ['bad','🚫 INVÁLIDO'] : ['ok','✅ VÁLIDO']);
        return `<div class="drow"><span class="drname">${d.l}</span><span class="dbadge ${cls}">${txt}</span></div>`;
      }).join('');
      detail.classList.add('show');
    }

    function triggerCamera() { document.getElementById('cameraInput').click(); }

    function showScan(msg, err) {
      const el = document.getElementById('scanStatus');
      el.textContent = msg; el.style.color = err ? '#E74C3C' : 'var(--gold-l)';
      el.classList.add('show');
    }
    
    function hideScan() { document.getElementById('scanStatus').classList.remove('show'); }

    function compressImage(file, max = 800) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            if (w > max || h > max) {
              const r = Math.min(max/w, max/h); w = Math.round(w*r); h = Math.round(h*r);
            }
            const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
            cv.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(cv.toDataURL('image/jpeg', 0.8).split(',')[1]);
          };
          img.onerror = reject; img.src = e.target.result;
        };
        reader.onerror = reject; reader.readAsDataURL(file);
      });
    }

    async function fetchWithRetry(url, options, retries = 3) {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url, options);
          if (!res.ok) throw new Error(await res.text());
          return await res.json();
        } catch (err) {
          if (i === retries - 1) throw err;
          await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
        }
      }
    }

    async function handleCameraImage(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      if (!apiKey && window.location.hostname !== "localhost" && !window.location.hostname.includes("google")) {
         showScan('❌ Falta API Key. Añádela en el código.', true);
         return;
      }

      showScan('⏳ Procesando billete...');
      try {
        const b64 = await compressImage(file);
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = {
          contents: [{ role: "user", parts: [
            { text: "Busca un número de serie de 8 o 9 dígitos en este billete. Responde SOLO con el número." },
            { inlineData: { mimeType: 'image/jpeg', data: b64 } }
          ]}]
        };

        const data = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const txt = (data?.candidates?.[0]?.content?.parts?.[0]?.text || '').trim();
        const m = txt.match(/\d{8,9}/);
        
        if (!m) { showScan('❌ No detectado. Intenta de nuevo con mejor luz.', true); return; }
        
        const serial = m[0].length === 8 ? '0' + m[0] : m[0];
        document.getElementById('serialInput').value = serial;
        updateCounter();
        showScan(`✅ Serie detectada: ${serial}`);
        setTimeout(() => { comprobar(); hideScan(); }, 800);
      } catch (e) {
        showScan('❌ Error de conexión. Revisa el internet o la clave.', true);
        console.error(e);
      } finally {
        document.getElementById('cameraInput').value = '';
      }
    }
  </script>
</body>
</html>
